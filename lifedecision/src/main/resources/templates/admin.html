<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fa;
        }

        .dashboard-title {
            font-weight: 700;
            margin-bottom: 40px;
        }

        .card-custom {
            border-radius: 15px;
            color: white;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card-custom:hover {
            transform: translateY(-5px);
        }

        .bg-blue { background: linear-gradient(45deg, #1e3c72, #2a5298); }
        .bg-green { background: linear-gradient(45deg, #11998e, #38ef7d); }
        .bg-orange { background: linear-gradient(45deg, #f7971e, #ffd200); }
        .bg-purple { background: linear-gradient(45deg, #8e2de2, #4a00e0); }
        .bg-red { background: linear-gradient(45deg, #cb2d3e, #ef473a); }
        .bg-darkblue { background: linear-gradient(45deg, #2c3e50, #4ca1af); }

        .card h3 {
            font-size: 1.1rem;
        }

        .card h2 {
            font-weight: 700;
            margin-top: 10px;
        }

        .footer-link {
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center dashboard-title">📊 Admin Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card card-custom bg-blue p-4 text-center">
                <h3>Total Decisions</h3>
                <h2 th:text="${total}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-custom bg-green p-4 text-center">
                <h3>High Income Goals</h3>
                <h2 th:text="${highIncome}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-custom bg-orange p-4 text-center">
                <h3>Startup Recommendations</h3>
                <h2 th:text="${startup}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-custom bg-purple p-4 text-center">
                <h3>MNC Recommendations</h3>
                <h2 th:text="${mnc}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-custom bg-red p-4 text-center">
                <h3>High Risk Users</h3>
                <h2 th:text="${highRisk}"></h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-custom bg-darkblue p-4 text-center">
                <h3>Low Risk Users</h3>
                <h2 th:text="${lowRisk}"></h2>
            </div>
        </div>

    </div>

    <div class="text-center footer-link">
        <a href="/" class="btn btn-dark mt-4">Back to Home</a>
    </div>

</div>

</body>
</html>
