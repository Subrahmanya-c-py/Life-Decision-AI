<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Life Decision Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }
        .section-title {
            margin-top: 50px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <h2 class="text-center mb-4">🚀 Life Decision Smart Dashboard</h2>

    <!-- ================= FORM ================= -->
    <div class="card p-4 mb-5">
        <h4>Make New Decision</h4>
        <form action="/analyze" method="post">
            <div class="row">
                <div class="col-md-3">
                    <input type="text" name="name" class="form-control" placeholder="Name" required>
                </div>
                <div class="col-md-3">
                    <select name="goal" class="form-control">
                        <option>High Income</option>
                        <option>Entrepreneurship</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="risk" class="form-control">
                        <option>High</option>
                        <option>Low</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="education" class="form-control">
                        <option>Engineering</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-dark mt-3">Analyze</button>
        </form>
    </div>

    <!-- ================= STATISTICS ================= -->
    <h4 class="section-title">📊 Analytics</h4>

    <div class="row text-center mb-5">

        <div class="col-md-3">
            <div class="card p-3 bg-dark text-white">
                <h6>Total Decisions</h6>
                <h3 th:text="${total}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 bg-primary text-white">
                <h6>High Income Goals</h6>
                <h3 th:text="${highIncome}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 bg-success text-white">
                <h6>Startup Recommendations</h6>
                <h3 th:text="${startup}"></h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 bg-warning text-dark">
                <h6>MNC Recommendations</h6>
                <h3 th:text="${mnc}"></h3>
            </div>
        </div>

    </div>

    <!-- ================= HISTORY ================= -->
    <h4 class="section-title">📜 Decision History</h4>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-bordered text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Goal</th>
                    <th>Risk</th>
                    <th>Recommendation</th>
                    <th>Confidence</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${decisions}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.name}"></td>
                    <td th:text="${d.goal}"></td>
                    <td th:text="${d.risk}"></td>
                    <td th:text="${d.recommendation}"></td>
                    <td th:text="${d.confidence} + '%'"></td>
                    <td>
                        <a th:href="@{/pdf/{id}(id=${d.id})}" class="btn btn-success btn-sm">PDF</a>
                        <a th:href="@{/delete/{id}(id=${d.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
